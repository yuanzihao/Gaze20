name: Build Gaze20

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-release:
    name: Windows release build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Windows packaging tools
        shell: pwsh
        run: |
          choco install nsis wixtoolset --yes --no-progress
          $nsisPath = Join-Path ${env:ProgramFiles(x86)} "NSIS"
          if (Test-Path $nsisPath) {
            $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

          $wixRoot = Get-ChildItem ${env:ProgramFiles(x86)} -Directory -Filter "WiX Toolset*" |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if ($wixRoot) {
            Join-Path $wixRoot.FullName "bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Install dependencies
        run: npm ci

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build Tauri release
        run: npm run tauri build

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: gaze20-windows-exe
          path: src-tauri/target/release/gaze20.exe
          if-no-files-found: error

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: gaze20-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*setup.exe
          if-no-files-found: error
