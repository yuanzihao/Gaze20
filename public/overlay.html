<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>远眺提醒</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden; user-select: none;
    font-family: "Manrope", "Noto Sans SC", system-ui, -apple-system, "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
    /* Stay transparent until the card is ready to animate in. */
    background: transparent;
  }
  .card {
    width: 100%; height: 100%;
    background: linear-gradient(165deg, #f3faf7 0%, #e9f4ef 55%, #e2f0ea 100%);
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 26px 22px; position: relative;
    opacity: 0;
    transform: scale(.86) translateY(8px);
    transform-origin: 50% 50%;
    will-change: transform, opacity;
  }
  body.ready .card {
    animation: card-enter .56s cubic-bezier(.16, 1, .3, 1) forwards;
  }
  @keyframes card-enter {
    0% { opacity: 0; transform: scale(.86) translateY(8px); }
    62% { opacity: 1; transform: scale(1.018) translateY(0); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .card { opacity: 1; transform: none; }
    body.ready .card { animation: none; }
  }
  .brand {
    display: flex; align-items: center; gap: 7px; margin-bottom: 4px;
    font-size: 12.5px; font-weight: 700; color: #2f6d5b; opacity: .85;
  }
  .close {
    position: absolute; top: 14px; right: 16px; width: 26px; height: 26px;
    border: none; background: transparent; color: #9bb3a9; cursor: pointer;
    display: flex; align-items: center; justify-content: center; border-radius: 8px;
  }
  .close:hover { background: rgba(0,0,0,.05); color: #5f7d72; }

  /* The glossy, breathing countdown orb. */
  .orb { position: relative; width: 168px; height: 168px; margin: 14px 0 10px; }
  .orb .breathe { width: 100%; height: 100%; animation: breathe 4.2s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
  .orb svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
  .orb .runner, .orb .runner-glow { will-change: transform; }
  .orb .runner-glow { opacity: .78; }
  /* glossy inner sphere */
  .orb .sphere {
    position: absolute; inset: 22px; border-radius: 50%;
    background:
      radial-gradient(120% 120% at 32% 26%, #ffffff 0%, #eaf6f0 38%, #d6ede4 70%, #bfe2d4 100%);
    box-shadow: inset 0 -10px 22px -10px rgba(31,122,100,.45),
                inset 0 8px 16px -6px rgba(255,255,255,.9),
                0 10px 26px -10px rgba(31,122,100,.5);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .orb .sphere::before {
    content: ""; position: absolute; left: 18px; right: 18px; top: 13px; height: 44px;
    border-radius: 50%; background: radial-gradient(ellipse at center, rgba(255,255,255,.86), rgba(255,255,255,.18) 68%, transparent 72%);
    opacity: .78; pointer-events: none;
  }
  .orb .sphere::after {
    content: ""; position: absolute; left: 24px; right: 24px; bottom: 16px; height: 24px;
    border-radius: 50%; background: radial-gradient(ellipse at center, rgba(24,111,92,.18), transparent 72%);
    pointer-events: none;
  }
  .orb .sphere b { position: relative; z-index: 1; font-size: 52px; font-weight: 800; color: #1f7a64; line-height: 1; letter-spacing: -1px; text-shadow: 0 1px 0 rgba(255,255,255,.7); }
  .orb .sphere i { position: relative; z-index: 1; font-style: normal; font-size: 13px; font-weight: 700; color: #5f9080; margin-top: 2px; }
  /* soft pulsing glow behind the orb */
  .orb::before {
    content: ""; position: absolute; inset: 6px; border-radius: 50%;
    background: radial-gradient(circle, rgba(95,202,166,.45), transparent 68%);
    filter: blur(6px); animation: glow 4.2s ease-in-out infinite;
  }
  @keyframes glow { 0%,100% { opacity: .55; transform: scale(.96); } 50% { opacity: .9; transform: scale(1.06); } }

  .title { font-size: 24px; font-weight: 800; color: #1d3a32; margin-top: 6px; }
  .focus { font-size: 13px; font-weight: 600; color: #6f9184; margin-top: 6px; }
  .sub { font-size: 13.5px; line-height: 1.6; font-weight: 500; color: #5f8074; margin-top: 4px; text-align: center; }
  .pills { display: flex; gap: 9px; justify-content: center; margin-top: 16px; }
  .pill {
    display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,.8);
    border: 1px solid #d8ebe3; border-radius: 11px; padding: 8px 13px;
    font-size: 12.5px; font-weight: 700; color: #41584f;
  }
  .actions { display: flex; gap: 9px; margin-top: 18px; width: 100%; }
  .actions button {
    flex: 1; border: none; border-radius: 13px; padding: 12px 8px; font-size: 13.5px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: filter .12s, background .12s;
  }
  .actions .primary { flex: 1.5; background: linear-gradient(135deg, #34a98b, #1f7a64); color: #fff; box-shadow: 0 8px 16px -7px rgba(31,122,100,.6); }
  .actions .primary:hover { filter: brightness(1.06); }
  .actions .ghost { background: rgba(255,255,255,.75); color: #41584f; border: 1px solid #dde7e3; }
  .actions .ghost:hover { background: #fff; }

  /* Daily symptom self-assessment mode (kind === "symptom"). */
  .card.symptom-mode { padding: 18px 26px 18px; }
  .symptom-mode .brand { margin-bottom: 2px; }
  .symptom-mode .title { margin-top: 8px; font-size: 22px; }
  .symptom-mode .sub { max-width: 340px; margin-top: 5px; }
  .symptom { width: 100%; margin-top: 13px; display: flex; flex-direction: column; gap: 12px; }
  .syMood {
    display: grid; grid-template-columns: 68px 1fr auto; align-items: center; gap: 12px;
    padding: 12px; border: 1px solid rgba(198,226,216,.85); border-radius: 18px;
    background: linear-gradient(145deg, rgba(255,255,255,.82), rgba(222,241,234,.72));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.75), 0 12px 24px -18px rgba(31,122,100,.52);
  }
  .syBot {
    position: relative; width: 58px; height: 58px; border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; line-height: 1;
    background:
      radial-gradient(circle at 34% 24%, rgba(255,255,255,.95), rgba(255,255,255,.16) 38%, transparent 39%),
      linear-gradient(145deg, #ffffff, #d9f0e7 58%, #bfe4d7);
    box-shadow: inset 0 -10px 18px -13px rgba(31,122,100,.78),
                inset 0 8px 16px -10px rgba(255,255,255,.95),
                0 12px 20px -13px rgba(31,122,100,.72);
    transform-origin: 50% 70%;
  }
  .syBot::before {
    content: ""; position: absolute; top: -8px; left: 50%; width: 18px; height: 18px;
    transform: translateX(-50%); border-radius: 50%;
    background: radial-gradient(circle at 35% 25%, #fff, #75ddc0 36%, #249277 78%);
    border: 2px solid rgba(255,255,255,.88);
    box-shadow: 0 5px 10px -5px rgba(31,122,100,.65);
  }
  .syBot.pop { animation: sy-face-pop .36s cubic-bezier(.16, 1, .3, 1); }
  @keyframes sy-face-pop {
    0% { transform: scale(.92) rotate(-2deg); }
    58% { transform: scale(1.08) rotate(2deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .syMoodCopy { min-width: 0; }
  .syMoodCopy b { display: block; color: #1d3a32; font-size: 14px; font-weight: 800; }
  .syMoodCopy span { display: block; margin-top: 4px; color: #6d8b80; font-size: 11.5px; line-height: 1.35; font-weight: 650; }
  .syScore {
    min-width: 50px; height: 50px; border-radius: 18px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #1f7a64; background: rgba(255,255,255,.72); border: 1px solid rgba(205,230,221,.95);
  }
  .syScore strong { font-size: 20px; line-height: 1; }
  .syScore span { margin-top: 2px; font-size: 10px; color: #78968b; font-weight: 800; }
  .syRows { width: 100%; display: flex; flex-direction: column; gap: 9px; }
  .syRow {
    display: grid; grid-template-columns: minmax(88px, 1fr) auto 54px; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 15px; background: rgba(255,255,255,.45);
    border: 1px solid rgba(218,235,229,.72);
  }
  .syRow .lab { font-size: 12.8px; font-weight: 800; color: #41584f; }
  .syRow .dots { display: flex; gap: 6px; }
  .syRow .dot {
    width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #cfe2da;
    background: #fff; cursor: pointer;
    transition: transform .16s cubic-bezier(.16, 1, .3, 1), background .14s, border-color .14s, box-shadow .14s;
  }
  .syRow .dot.on { transform: translateY(-1px) scale(1.06); box-shadow: 0 7px 12px -8px currentColor; }
  .syRow .dot.hit { animation: sy-dot-hit .28s cubic-bezier(.16, 1, .3, 1); }
  @keyframes sy-dot-hit {
    0% { transform: scale(.75); }
    70% { transform: scale(1.16); }
    100% { transform: scale(1.06); }
  }
  .syLevel { font-size: 11px; color: #799489; font-weight: 800; text-align: right; white-space: nowrap; }
  .syLegend {
    display: flex; align-items: center; justify-content: space-between;
    color: #89a69b; font-size: 10.8px; font-weight: 750; padding: 0 4px;
  }
  .symptom .actions { margin-top: 1px; }
  .symptom .actions button { padding: 13px 8px; }
</style>
</head>
<body>
  <div class="card">
    <button class="close" id="close" title="跳过">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <div class="brand">
      <svg width="16" height="16" viewBox="0 0 50 50" fill="none"><ellipse cx="25" cy="25" rx="16" ry="10" fill="rgba(31,122,100,.18)"/><circle cx="25" cy="25" r="6" fill="#1f7a64"/><circle cx="25" cy="25" r="2.6" fill="#0c3d31"/></svg>
      远眺 Gaze20
    </div>

    <div class="orb">
      <div class="breathe">
        <svg viewBox="0 0 168 168">
          <defs>
            <linearGradient id="ringGradient" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#7fe0bf"/><stop offset="100%" stop-color="#1f7a64"/>
            </linearGradient>
            <radialGradient id="runnerFill" cx="32%" cy="24%" r="78%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="32%" stop-color="#95ead0"/>
              <stop offset="68%" stop-color="#2fa487"/>
              <stop offset="100%" stop-color="#116551"/>
            </radialGradient>
            <filter id="runnerShadow" x="-90%" y="-90%" width="280%" height="280%">
              <feDropShadow dx="0" dy="4" stdDeviation="3.2" flood-color="#0f6756" flood-opacity=".36"/>
              <feDropShadow dx="-1" dy="-1" stdDeviation="1.1" flood-color="#ffffff" flood-opacity=".72"/>
            </filter>
          </defs>
          <circle cx="84" cy="84" r="76" fill="none" stroke="#cfe8df" stroke-width="14" opacity=".46"/>
          <circle cx="84" cy="84" r="76" fill="none" stroke="#f9fffc" stroke-width="5" opacity=".7"/>
          <circle id="ring" cx="84" cy="84" r="76" fill="none" stroke="url(#ringGradient)" stroke-width="10"
                  stroke-linecap="round" stroke-dasharray="0 478" transform="rotate(-90 84 84)"
                  style="transition: stroke-dasharray .16s linear"/>
          <g id="runnerGlow" class="runner-glow" transform="translate(84 8)">
            <circle r="15" fill="#7fdcc2" opacity=".22"/>
            <circle r="9.5" fill="#2fa487" opacity=".16"/>
          </g>
          <g id="runner" class="runner" transform="translate(84 8)" filter="url(#runnerShadow)">
            <circle r="9.2" fill="url(#runnerFill)"/>
            <circle r="7.7" fill="none" stroke="#eafff8" stroke-width="1.25" opacity=".75"/>
            <circle cx="-3.2" cy="-3.5" r="2.35" fill="#ffffff" opacity=".94"/>
            <ellipse cx="2.7" cy="3.1" rx="3.8" ry="2.05" fill="#0c5949" opacity=".22"/>
          </g>
        </svg>
      </div>
      <div class="sphere"><b id="count">20</b><i id="unit">秒</i></div>
    </div>

    <div class="title" id="title">该远眺一下了</div>
    <div class="focus" id="focus"></div>
    <div class="sub" id="sub">看向 6 米外，保持 20 秒，并做 5–10 次完整眨眼</div>

    <div class="pills" id="pills"></div>

    <div class="actions">
      <button class="primary" id="primary">开始休息</button>
      <button class="ghost" id="postpone">延后 5 分钟</button>
      <button class="ghost" id="skip">跳过</button>
    </div>

  </div>

  <template id="symptomTemplate">
    <div class="symptom" id="symptomBox">
      <div class="syMood" id="syMood">
        <div class="syBot" id="syFace">🙂</div>
        <div class="syMoodCopy">
          <b id="syMoodTitle">今天还不错</b>
          <span id="syMoodText">点选每项症状，表情会跟着你的状态变化。</span>
        </div>
        <div class="syScore"><strong id="syScore">0</strong><span>/25</span></div>
      </div>
      <div class="syRows" id="syRows"></div>
      <div class="syLegend"><span>0 无感</span><span>3 明显</span><span>5 很重</span></div>
      <div class="actions">
        <button class="primary" id="sysubmit">提交</button>
        <button class="ghost" id="sylater">稍后</button>
      </div>
    </div>
  </template>

  <script>
  (function () {
    var cfg = window.__GAZE20_OVERLAY__ || {};
    var label = String(cfg.label || "");
    var kind = cfg.kind === "deep" ? "deep" : (cfg.kind === "symptom" ? "symptom" : "micro");
    var total = Number(cfg.seconds);
    if (!isFinite(total) || total <= 0) total = kind === "micro" ? 20 : 180;
    total = Math.max(5, Math.min(1800, total));
    var focusMin = Number(cfg.focusMinutes) || 0;
    var CENTER = 84, RADIUS = 76, RING = 2 * Math.PI * RADIUS;

    var startedAt = null, sent = false;
    var tauri = window.__TAURI__;
    function invoke(c, a) { try { if (tauri && tauri.core) return tauri.core.invoke(c, a || {}); } catch (e) {} }
    function listen(e, cb) { try { if (tauri && tauri.event) return tauri.event.listen(e, cb); } catch (e2) {} }
    function fmt(s) { var m = Math.floor(s / 60), x = s % 60; return m > 0 ? (m + ":" + String(x).padStart(2, "0")) : String(s); }
    function revealNow() {
      var r = label ? invoke("overlay_ready", { label: label }) : null;
      function go() { document.body.classList.add("ready"); }
      if (r && typeof r.then === "function") r.then(go).catch(go); else go();
    }

    // Daily symptom self-assessment: repurpose the card for 5 severity sliders.
    if (kind === "symptom") {
      var tmpl = document.getElementById("symptomTemplate");
      var symptomNode = tmpl.content.firstElementChild.cloneNode(true);
      var card = document.querySelector(".card");
      card.classList.add("symptom-mode");
      card.appendChild(symptomNode);
      document.querySelector(".orb").style.display = "none";
      document.getElementById("focus").style.display = "none";
      document.getElementById("pills").style.display = "none";
      document.querySelector(".card > .actions").style.display = "none";
      document.getElementById("title").textContent = "记录今天的眼睛症状";
      document.getElementById("sub").textContent = "给今天每项症状打个分，越重表情越难过";
      var items = [
        ["redness", "眼睛红血丝"],
        ["dry", "眼睛干涩"],
        ["blur", "视物模糊"],
        ["headache", "头痛不适"],
        ["neck", "颈肩酸痛"]
      ];
      var values = { dry: 0, blur: 0, headache: 0, neck: 0, redness: 0 };
      var rowsBox = document.getElementById("syRows");
      var syFace = document.getElementById("syFace");
      var syMoodTitle = document.getElementById("syMoodTitle");
      var syMoodText = document.getElementById("syMoodText");
      var syScore = document.getElementById("syScore");
      function colorFor(v) { return v >= 5 ? "#df6b6b" : v >= 3 ? "#efa73b" : "#2c9a81"; }
      function levelFor(v) { return v === 0 ? "无感" : v <= 2 ? "轻微" : v <= 4 ? "明显" : "很重"; }
      function moodFor(total) {
        if (total >= 18) return ["😢", "今天压力偏高", "先完成休息，晚些可以减少连续盯屏。"];
        if (total >= 11) return ["😟", "眼睛有点吃力", "建议认真远眺并补几次完整眨眼。"];
        if (total >= 5) return ["😐", "有轻微疲劳", "记录到了，接下来留意干涩和模糊变化。"];
        return ["🙂", "今天还不错", "保持节奏，别让小疲劳慢慢堆起来。"];
      }
      function updateMood() {
        var total = Object.keys(values).reduce(function (sum, key) { return sum + values[key]; }, 0);
        var mood = moodFor(total);
        syFace.textContent = mood[0];
        syMoodTitle.textContent = mood[1];
        syMoodText.textContent = mood[2];
        syScore.textContent = String(total);
        syFace.classList.remove("pop");
        void syFace.offsetWidth;
        syFace.classList.add("pop");
      }
      items.forEach(function (it) {
        var key = it[0];
        var row = document.createElement("div"); row.className = "syRow";
        var lab = document.createElement("span"); lab.className = "lab"; lab.textContent = it[1];
        var dots = document.createElement("div"); dots.className = "dots";
        var level = document.createElement("span"); level.className = "syLevel";
        var dotEls = [];
        function paint(hitDot) {
          var v = values[key];
          var color = v >= 5 ? "#e26d6d" : v >= 3 ? "#eaa13a" : "#2c8e76";
          dotEls.forEach(function (d, idx) {
            var on = idx + 1 <= v;
            d.classList.toggle("on", on);
            d.style.background = on ? color : "#fff";
            d.style.borderColor = on ? color : "#cfe2da";
            d.style.color = colorFor(v);
          });
          level.textContent = levelFor(v);
          level.style.color = v >= 5 ? "#ce6262" : v >= 3 ? "#c77b1c" : "#5d897b";
          if (hitDot) {
            hitDot.classList.remove("hit");
            void hitDot.offsetWidth;
            hitDot.classList.add("hit");
          }
        }
        for (var i = 1; i <= 5; i++) {
          (function (i) {
            var d = document.createElement("span"); d.className = "dot";
            d.onclick = function () {
              values[key] = values[key] === i ? 0 : i;
              paint(d);
              updateMood();
            };
            dots.appendChild(d); dotEls.push(d);
          })(i);
        }
        paint();
        row.appendChild(lab); row.appendChild(dots); row.appendChild(level);
        rowsBox.appendChild(row);
      });
      updateMood();
      var sysent = false;
      document.getElementById("sysubmit").onclick = function () { if (sysent) return; sysent = true; invoke("submit_symptom", values); };
      function syLater() { if (sysent) return; sysent = true; invoke("overlay_action", { action: "skip", overlayKind: "symptom" }); }
      document.getElementById("sylater").onclick = syLater;
      document.getElementById("close").onclick = syLater;
      requestAnimationFrame(function () { requestAnimationFrame(revealNow); });
      return;
    }

    var elCount = document.getElementById("count"),
        elUnit = document.getElementById("unit"),
        elRing = document.getElementById("ring"),
        elRunner = document.getElementById("runner"),
        elRunnerGlow = document.getElementById("runnerGlow"),
        elTitle = document.getElementById("title"),
        elFocus = document.getElementById("focus"),
        elSub = document.getElementById("sub"),
        elPills = document.getElementById("pills"),
        elPrimary = document.getElementById("primary");

    elTitle.textContent = kind === "micro" ? "该远眺一下了" : "该起身深休息了";
    elUnit.style.display = kind === "micro" ? "" : "none";
    elSub.textContent = kind === "micro"
      ? "看向 6 米外，保持 20 秒，并做 5–10 次完整眨眼"
      : ("离开屏幕约 " + Math.max(1, Math.round(total / 60)) + " 分钟，走动、补水、放松肩颈");
    if (focusMin > 0) elFocus.textContent = "你已连续专注 " + focusMin + " 分钟";
    var pa = kind === "micro" ? "远眺 20 秒" : "起身走动";
    var pb = kind === "micro" ? "完整眨眼 5–10 次" : "补水 · 放松肩颈";
    elPills.innerHTML = '<div class="pill">' + pa + '</div><div class="pill">' + pb + '</div>';

    function updatePrimary() { elPrimary.textContent = startedAt === null ? "开始休息" : "完成休息"; }
    function moveRunner(progress) {
      var angle = -90 + progress * 360;
      var rad = angle * Math.PI / 180;
      var x = CENTER + Math.cos(rad) * RADIUS;
      var y = CENTER + Math.sin(rad) * RADIUS;
      var transform = "translate(" + x.toFixed(2) + " " + y.toFixed(2) + ")";
      elRunner.setAttribute("transform", transform);
      elRunnerGlow.setAttribute("transform", transform);
    }
    function render() {
      var elapsed = startedAt === null ? 0 : Math.max(0, Date.now() - startedAt);
      var remaining = startedAt === null ? total : Math.max(0, Math.ceil(total - elapsed / 1000));
      var progress = startedAt === null ? 0 : Math.max(0, Math.min(1, elapsed / (total * 1000)));
      elCount.textContent = kind === "micro" ? String(remaining) : fmt(remaining);
      elRing.setAttribute("stroke-dasharray", (progress * RING).toFixed(1) + " " + RING.toFixed(1));
      moveRunner(progress);
      if (startedAt !== null && remaining <= 0) action("complete");
    }
    function elapsedSeconds() {
      return startedAt === null ? 0 : Math.max(0, (Date.now() - startedAt) / 1000);
    }
    function begin() { if (startedAt !== null) return; startedAt = Date.now(); updatePrimary(); invoke("overlay_start"); }
    function action(a) { if (sent) return; sent = true; invoke("overlay_action", { action: a, elapsedSeconds: elapsedSeconds(), overlayKind: kind }); }

    elPrimary.onclick = function () { if (startedAt !== null) action("complete"); else begin(); };
    document.getElementById("postpone").onclick = function () { action("postpone"); };
    document.getElementById("skip").onclick = function () { action("skip"); };
    document.getElementById("close").onclick = function () { action("skip"); };
    listen("overlay-start", function () { if (startedAt === null) { startedAt = Date.now(); updatePrimary(); } });

    function reveal() { document.body.classList.add("ready"); }
    function showAfterFirstPaint() {
      var ready = label ? invoke("overlay_ready", { label: label }) : null;
      if (ready && typeof ready.then === "function") ready.then(reveal).catch(reveal);
      else reveal();
    }

    updatePrimary(); render(); setInterval(render, 100);
    requestAnimationFrame(function () {
      requestAnimationFrame(showAfterFirstPaint);
    });
  })();
  </script>
</body>
</html>
